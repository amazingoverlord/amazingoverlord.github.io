<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Ratio</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#262B2E;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:16px}
        .c{max-width:640px;width:100%;background:#262B2E;padding:24px 20px 28px;border:1px solid #4C5154}
        h1{font-size:20px;font-weight:600;color:#EAE3D6;display:flex;align-items:center;gap:8px;margin-bottom:2px;letter-spacing:-.02em}
        h1 span{background:#4C5154;color:#EAE3D6;font-size:13px;padding:0 10px;font-weight:500}
        .sub{color:#B7AAA1;font-size:13px;margin-bottom:20px;padding-left:10px;border-left:2px solid #4C5154}
        .tog{display:flex;gap:2px;background:#262B2E;padding:4px;margin-bottom:16px;border:1px solid #4C5154}
        .tog label{flex:1;min-width:70px;text-align:center;padding:8px 4px;font-size:12px;font-weight:500;color:#B7AAA1;cursor:pointer;background:#262B2E;transition:.1s;border:1px solid transparent}
        .tog input{display:none}
        .tog input:checked+label{background:#4C5154;color:#EAE3D6;border-color:#B7AAA1}
        .tog label:hover{color:#EAE3D6}
        .inp{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;background:#262B2E;padding:6px 14px 6px 16px;margin-bottom:20px;border:1px solid #4C5154}
        .inp label{font-weight:500;color:#B7AAA1;font-size:13px}
        .inp label i{background:#4C5154;padding:0 8px;font-size:10px;font-style:normal;color:#EAE3D6;margin-left:4px}
        .inp input{flex:1;min-width:80px;background:0 0;border:none;font-size:20px;padding:4px 0;outline:0;color:#EAE3D6;font-family:"SF Mono",monospace}
        .inp input::placeholder{color:#4C5154;font-size:13px}
        .gr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0 10px}
        .rc{background:#262B2E;padding:10px 14px 8px;border:1px solid #4C5154}
        .rc .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#B7AAA1;font-weight:600;display:flex;justify-content:space-between}
        .rc .lbl span{background:#262B2E;padding:0 8px;color:#EAE3D6;font-weight:500;border:1px solid #4C5154}
        .rc .val{font-size:24px;font-weight:500;color:#EAE3D6;margin-top:2px;font-feature-settings:"tnum";font-family:"SF Mono",monospace}
        .rc.highlight{border-color:#B7AAA1}
        .rc.sum{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:8px 14px}
        .rc.sum .val{font-size:22px}
        .rr{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;background:#262B2E;padding:6px 14px;margin:6px 0 12px;border:1px solid #4C5154}
        .rr .lbl{color:#B7AAA1;font-weight:500;font-size:12px}
        .rr .val{font-family:"SF Mono",monospace;font-weight:500;font-size:14px;color:#EAE3D6}
        .rr .chk{background:#4C5154;color:#EAE3D6;padding:0 10px;font-size:9px;font-weight:600;letter-spacing:.04em;line-height:20px;border:1px solid #B7AAA1}
        .bar{display:flex;gap:6px;margin:12px 0 10px;flex-wrap:wrap}
        .btn{background:#262B2E;border:1px solid #4C5154;padding:6px 16px;font-weight:500;color:#B7AAA1;font-size:12px;cursor:pointer;transition:.1s;font-family:inherit}
        .btn:active{transform:scale(.97)}
        .btn-p{background:#4C5154;color:#EAE3D6;border-color:#B7AAA1}
        .btn-p:hover{background:#4C5154}
        .btn:hover{color:#EAE3D6;border-color:#B7AAA1}
        .vw{background:#262B2E;padding:10px;border:1px solid #4C5154;display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:14px}
        .vw canvas{display:block;width:100%;max-width:200px;height:auto;aspect-ratio:1/1;background:#262B2E;border:1px solid #4C5154;margin:0 auto}
        .vw .lg{flex:1;min-width:100px;font-size:11px;color:#B7AAA1;line-height:1.6}
        .vw .lg strong{color:#EAE3D6;font-weight:600}
        .ft{margin-top:14px;font-size:10px;color:#4C5154;text-align:center;border-top:1px solid #4C5154;padding-top:12px;letter-spacing:.02em}
        @media(max-width:500px){.c{padding:16px 12px}h1{font-size:17px}.gr{grid-template-columns:1fr}.inp{padding:4px 10px 4px 12px}.inp input{font-size:16px}.vw canvas{max-width:140px}}
    </style>
</head>
<body>
<div class="c">
    <h1>✦ GOLDEN <span>φ</span></h1>
    <div class="sub">enter one — get all three</div>

    <div class="tog">
        <input type="radio" name="m" id="mA" value="a" checked><label for="mA">a (larger)</label>
        <input type="radio" name="m" id="mB" value="b"><label for="mB">b (smaller)</label>
        <input type="radio" name="m" id="mS" value="sum"><label for="mS">sum (a+b)</label>
    </div>

    <div class="inp">
        <label>enter <span id="sym">a</span> <i id="hint">larger</i></label>
        <input type="number" id="in" step="any" placeholder="e.g. 100" value="100">
    </div>

    <div class="gr">
        <div class="rc highlight"><div class="lbl">a (larger) <span>×φ</span></div><div class="val" id="va">100.00</div></div>
        <div class="rc"><div class="lbl">b (smaller) <span>÷φ</span></div><div class="val" id="vb">61.80</div></div>
        <div class="rc sum"><span style="font-weight:500;color:#B7AAA1">sum (a+b)</span><span class="val" id="vs">161.80</span></div>
    </div>

    <div class="rr"><span class="lbl">ratio a / b</span><span class="val" id="ratio">1.6180339887</span><span class="chk">✦ GOLDEN</span></div>

    <div class="bar">
        <button class="btn btn-p" id="copy">📋 COPY</button>
        <button class="btn" id="reset">↺ RESET</button>
    </div>

    <div class="vw">
        <canvas id="cv" width="400" height="400"></canvas>
        <div class="lg"><strong>golden rectangle</strong><br><span id="dim">a=100.0 b=61.8</span><br><span style="font-size:9px;opacity:.6">spiral with φ</span></div>
    </div>
    <div class="ft">φ = (1+√5)/2 = 1.618033988749895…</div>
</div>
<script>
(function(){const P=(1+Math.sqrt(5))/2,IP=1/P;
const el=document.getElementById('in'),va=document.getElementById('va'),vb=document.getElementById('vb'),vs=document.getElementById('vs'),ratio=document.getElementById('ratio'),dim=document.getElementById('dim'),sym=document.getElementById('sym'),hint=document.getElementById('hint'),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let mode='a';
function fmt(v,d=2){if(!isFinite(v)||v<=0)return'—';return Number(v.toFixed(d)).toLocaleString('en',{minFractionDigits:d,maxFractionDigits:d})}
function fmtf(v){return isFinite(v)?v.toString():'—'}
function calc(m,val){const x=parseFloat(val);if(isNaN(x)||x<=0)return{a:null,b:null,sum:null,ratio:null};
let a,b,s;if(m==='a'){a=x;b=a*IP;s=a+b}else if(m==='b'){b=x;a=b*P;s=a+b}else{s=x;a=s/(1+IP);b=s-a}return{a,b,sum:s,ratio:a/b}}
function draw(a,b){const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);if(!a||!b||a<=0||b<=0){ctx.fillStyle='#4C5154';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('enter value',W/2,H/2);return}
const total=a+b,sc=Math.min(W,H)*.65/total,ox=(W-total*sc)/2,oy=(H-total*sc)/2;
ctx.strokeStyle='#EAE3D6';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,a*sc,b*sc);
ctx.fillStyle='#262B2E';ctx.fillRect(ox,oy,a*sc,b*sc);
ctx.strokeStyle='#B7AAA1';ctx.lineWidth=2;
let x=ox+b*sc,y=oy,size=b*sc,dir=0,it=0;
while(size>1&&it<20){ctx.beginPath();if(dir===0)ctx.arc(x,y+size,size,-Math.PI/2,0);else if(dir===1)ctx.arc(x+size,y,size,0,Math.PI/2);else if(dir===2)ctx.arc(x,y-size,size,Math.PI/2,Math.PI);else ctx.arc(x-size,y,size,Math.PI,3*Math.PI/2);ctx.stroke();
if(dir===0){y-=size;x+=size;size/=P;dir=1}else if(dir===1){x-=size;y-=size;size/=P;dir=2}else if(dir===2){y+=size;x-=size;size/=P;dir=3}else{x+=size;y+=size;size/=P;dir=0}it++}
ctx.strokeStyle='#4C5154';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(ox+b*sc,oy);ctx.lineTo(ox+b*sc,oy+b*sc);ctx.stroke();ctx.setLineDash([]);
ctx.fillStyle='#B7AAA1';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('b',ox+b*sc/2,oy+b*sc+4);ctx.fillText('a',ox+b*sc+a*sc/2,oy+b*sc+4)}
function update(){const raw=el.value.trim(),num=parseFloat(raw);const info={a:{s:'a',h:'larger'},b:{s:'b',h:'smaller'},sum:{s:'a+b',h:'sum'}}[mode];sym.textContent=info.s;hint.textContent=info.h;
let r={a:null,b:null,sum:null,ratio:null};if(raw!==''&&!isNaN(num)&&num>0)r=calc(mode,num);
const ok=r.a!==null&&isFinite(r.a)&&r.a>0;
va.textContent=ok?fmt(r.a):'—';vb.textContent=ok?fmt(r.b):'—';vs.textContent=ok?fmt(r.sum):'—';
ratio.textContent=ok&&r.ratio!==null&&isFinite(r.ratio)?fmtf(r.ratio):'—';
dim.textContent=ok?`a=${fmt(r.a)}  b=${fmt(r.b)}`:'enter a positive number';
draw(ok?r.a:null,ok?r.b:null)}
document.querySelectorAll('input[name="m"]').forEach(r=>{r.addEventListener('change',function(){if(this.checked){mode=this.value;update()}})});
el.addEventListener('input',update);
document.getElementById('copy').addEventListener('click',function(){const txt=[`a=${va.textContent}`,`b=${vb.textContent}`,`sum=${vs.textContent}`,`ratio=${ratio.textContent}`,`φ=${P}`].join('\n');navigator.clipboard.writeText(txt).then(()=>{const t=this.innerHTML;this.innerHTML='✓ DONE';setTimeout(()=>this.innerHTML=t,1000)}).catch(()=>alert(txt))});
document.getElementById('reset').addEventListener('click',function(){el.value='100';update()});
document.getElementById('mA').checked=true;mode='a';el.value='100';update();
window.addEventListener('resize',()=>{const a=parseFloat(va.textContent.replace(/,/g,''));const b=parseFloat(vb.textContent.replace(/,/g,''));if(!isNaN(a)&&!isNaN(b)&&a>0&&b>0)draw(a,b);else draw(null,null)});
})();
</script>
</body>
</html>
