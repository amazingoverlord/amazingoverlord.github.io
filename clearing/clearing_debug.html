<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clearing Debug</title>
  <style>
    /* reset margins/paddings to ensure full-window layout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;  /* prevent scrollbars on body; iframes handle their own scrolling */
    }

    body {
      display: flex;
      flex-direction: row;
      background: #1a1a1a;  /* dark background visible between iframes (optional) */
    }

    /* left iframe: fixed width 310px, full height */
    .iframe-left {
      width: 310px;
      height: 100%;
      border: none;
      display: block;
      flex-shrink: 0;      /* prevents shrinking below 320px */
      background: #fff;
    }

    /* right iframe: takes all remaining space, full height */
    .iframe-right {
      flex: 1;             /* fills the rest of the window width */
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* optional: subtle separator line (visual divider) */
    body {
      border-right: 1px solid #333;  /* left edge separator effect */
    }
    .iframe-left {
      border-right: 1px solid #666;
    }

    /* ensure iframes respect container bounds */
    iframe {
      overflow: auto;
    }
  </style>
</head>
<body>
  <iframe class="iframe-left" src="/clearing/clearing_data.html" title="data"></iframe>
  <iframe class="iframe-right" src="/clearing/index.html" title="Clearing"></iframe>
</body>
</html>
