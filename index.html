<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO 3000 BC</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Cormorant:ital,wght@0,300..700;1,300..700&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sometype+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="/assets/style_v2.css" rel="stylesheet">
    <style>
      .pillars-container {
        width: 55%;
        min-width: 180px;
      }

      #ascii {
        position: fixed;
        top: 40px;
        left: 60%;
        transform: translateX(-50%);
        z-index: 1;
        overflow: hidden;
      }

      #ascii pre {
        font-family: "Sometype Mono", "Courier New", monospace;
        font-size: 0.7rem;
        line-height: 0.7;
        color: #7d7c7b;
        white-space: pre;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1>3000 bc</h1>
    <div class="pillars-container">
      <div class="content" id="weather-widget">Loading briefing...</div>
      <div class="content">
        Latest Work:<br>
        <span id="latest-work"></span>
        <br>
        Current Forms:<br>
        <span id="current-forms"></span>
      </div>
      <div class="content">
        Recommended:
        <div class="c1" id="recommended"></div>
      </div>
      <div class="footer">
        <center><a href="https://neocities.org/" target="_blank" style="display: block;">Made by hand</a></center>
      </div>
      <div class="orange"></div>
    </div>
    <div id="ascii">
      <pre id="walking">Loading animation...</pre>
    </div>
    <script src="/briefing_minimal.js"></script>
    <script src="/content_loader_v2.js"></script>
    <script src="/assets/ascii_walking.js"></script>
    <script>
      window.WeatherMinimal?.init(document.getElementById('weather-widget'));
    </script>
  </body>
</html>
