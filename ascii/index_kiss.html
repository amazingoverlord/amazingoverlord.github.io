<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO 3000 BC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant&family=Sometype+Mono&display=swap" rel="stylesheet">
    <link href="/assets/style_v2.css" rel="stylesheet">
    <style>
      .pillars-container { width: 55%; min-width: 180px; }
      
      #ascii {
        position: fixed;
        top: 5%;
        left: 50%;
        z-index: 1;
        overflow: hidden;
      }
      
      #ascii pre {
        font-family: "Sometype Mono", "Courier New", monospace;
        font-size: 1.75vh;
        line-height: 0.75;
        color: #1d1d1d;
        white-space: pre;
        margin: 0;
        padding: 0;
        overflow: hidden;
        
      }
    </style>
  </head>
  <body>
    <h1>3000 bc</h1>
    <div class="pillars-container">
      <div class="content" id="weather-widget">Loading briefing...</div>
      <div class="content">
        Latest Work:<br>
        <span id="latest-work"></span>
        <br>
        Current Forms:<br>
        <span id="current-forms"></span>
      </div>
      <div class="content">
        Recommended:
        <div class="c1" id="recommended"></div>
      </div>
      <div class="footer">
        <center><a href="https://neocities.org/" target="_blank" style="display: block;">Made by hand at Neocities</a></center>
      </div>
      <div class="orange"></div>
    </div>
    <div id="ascii">
      <pre id="kiss">Loading animation...</pre>
    </div>
    <script src="briefing_minimal.js"></script>
    <script src="content_loader_v2.js"></script>
    <script src="briefing_minimal.js"></script>
    <script src="ascii_kiss.js"></script>
    <script>
      window.WeatherMinimal?.init(document.getElementById('weather-widget'));
    </script>

  </body>
</html>
