<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Project Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Cormorant:ital,wght@0,300..700;1,300..700&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sometype+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link href="/assets/style_v2.css" rel="stylesheet">
  <style>
    .projects {
      flex: 1 1 85%;
      padding: 0;
      margin: 0;
      min-width: 350px;
      background-color: rgba(29, 29, 29, 0.0);
      color: #d8d2cc;
      position: relative;
      z-index: 1;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 2.5px;
      margin: 0;
      table-layout: fixed;
      position: relative;
      z-index: 2;
      background-color: transparent;
    }

    .labels {
      background-color: #1d1d1d;
      font-weight: 700;
    }

    th {
      background-color: #1d1d1d;
      font-weight: 700;
      text-align: left;
      padding: 6px;
      vertical-align: top;
    }

    td:nth-child(1), th:nth-child(1) { width: 25%; }
    td:nth-child(2), th:nth-child(2) { width: 14%; }
    td:nth-child(3), th:nth-child(3) { width: 15%; }
    td:nth-child(4), th:nth-child(4) { width: 4%; }
    td:nth-child(5), th:nth-child(5) { width: 42%; }

    .project-row {
      cursor: pointer;
      transition: background-color 0.75s;
    }

    .project-row:hover {
      transition: background-color 0.125s;
      background-color: #1d1d1d;
      color: #d8d2cc;
    }

    td {
      border: none;
      padding: 6px;
      background-color: rgba(29, 29, 29, 0.75);
      color: #d8d2cc;
      vertical-align: top;
    }

    td a {
      display: block;
      text-decoration: none;
      color: #d8d2cc;
    }

    td a:hover {
      transition: background-color 0.125s;
      background-color: #1d1d1d;
      color: #d8d2cc;
      text-decoration: none;
    }

    /* Background Title Container */
    #hoverTitleContainer {
      position: fixed;
      top: 10px;
      left: -500;
      width: 100%;
      height: 100%;
      z-index: -10;
      pointer-events: none;
      display: flex;
      justify-content: left;
      align-items: center;
      opacity: 0;
      transition: opacity 0.666s ease, visibility 0.666s ease;
    }

    #hoverTitleContainer.active {
      opacity: .33;
    }

    #hoverTitle {
      font-family: 'Ballet', serif;
      font-size: 18vw;
      color: #1d1d1d;
      text-align: left;
      line-height: 1;
      max-width: 99vw;
      word-wrap: break-word;
      white-space: normal;
    }
  </style>
</head>
<body>
  <div class="home">
    <a href="/index.html">3000 bc</a>
  </div>
  <h1>Select Project Archive</h1>

  <div class="pillars-container">
    <div class="projects">
      <table>
        <tr class="labels">
          <th>Title</th>
          <th>Medium</th>
          <th>Role</th>
          <th>Date</th>
          <th>Notes</th>
        </tr>
        <tbody id="projectTable"></tbody>
      </table>
    </div>

    <div class="pillar">
      <p>Front Page Archive: <a href="index_v1.html">v1</a></p>
    </div>
  </div>

  <!-- Background Title Element -->
  <div id="hoverTitleContainer">
    <div id="hoverTitle"></div>
  </div>

  <script>
    const titleContainer = document.getElementById('hoverTitleContainer');
    const titleElement = document.getElementById('hoverTitle');
    let currentTitle = null;
    let fadeTimeout = null;

    function showTitle(title) {
      // Same title? Don't reload
      if (currentTitle === title && titleContainer.classList.contains('active')) {
        return;
      }
      
      currentTitle = title;
      
      // Update the title text
      titleElement.innerText = title;
      
      // Clear any pending fade timeout
      if (fadeTimeout) {
        clearTimeout(fadeTimeout);
      }
      
      // Fade in
      fadeTimeout = setTimeout(() => {
        titleContainer.classList.add('active');
      }, 10);
    }

    function hideTitle() {
      // Clear any pending fade timeout
      if (fadeTimeout) {
        clearTimeout(fadeTimeout);
      }
      
      // Fade out
      titleContainer.classList.remove('active');
      currentTitle = null;
    }

    // Build table from JSON
    fetch('project_data.json')
      .then(response => response.json())
      .then(data => {
        const tbody = document.getElementById('projectTable');
        tbody.innerHTML = '';
        
        data.projects.forEach(project => {
          const row = document.createElement('tr');
          row.className = 'project-row';
          
          row.addEventListener('mouseenter', () => {
            showTitle(project.title);
          });
          
          row.addEventListener('mouseleave', () => {
            hideTitle();
          });
          
          row.innerHTML = `
            <td><a href="${project.link}" target="project">${project.title}</a></td>
            <td><a href="${project.link}" target="project">${project.medium}</a></td>
            <td><a href="${project.link}" target="project">${project.role}</a></td>
            <td><a href="${project.link}" target="project">${project.date}</a></td>
            <td><a href="${project.link}" target="project">${project.notes}</a></td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(error => console.error('Error loading data:', error));
  </script>
</body>
</html>
